1:{
passage:`Cultural bias remains a significant obstacle in our connected world. As we enter 2025, many communities struggle with preconceptions about people from different backgrounds. These biases often stem from limited exposure to other cultures. Children typically acquire these prejudices from their environment rather than being born with them. Recent studies show that <b><u>unconscious</b></u> bias affects decision-making in education, healthcare, and employment, creating barriers for qualified individuals. Addressing this challenge requires both personal awareness and systemic changes.

In workplaces, cultural bias manifests when managers favor candidates who share <b><u>their</b></u> cultural background. In schools, students from certain cultures may face lower expectations from teachers who harbor preconceptions. Media representation perpetuates stereotypes by portraying specific groups in limited roles. These portrayals reinforce existing biases and shape public perception. Organizations that neglect cultural diversity training risk creating unwelcoming environments for employees and clients alike.

Approaches to mitigate cultural bias include educational initiatives exposing people to diverse perspectives early. Technology facilitates cultural exchange through virtual reality experiences. Many corporations have implemented blind recruitment processes to eliminate discrimination. Community events celebrating different traditions help break down barriers between groups. These combined efforts are gradually shifting attitudes, though progress remains <b><u>uneven</b></u> across regions.

<b><u>The benefits of overcoming cultural bias extend beyond social harmony.</b></u> Research indicates that diverse teams outperform homogeneous ones in problem-solving. Countries embracing multiculturalism often experience economic growth through increased creativity. Individuals who overcome their biases report more fulfilling relationships and broader worldviews. The challenge of confronting cultural bias requires sustained commitment from individuals, organizations, and governments working together.`,

passage:`<b><u>[I]</b></u> The environmental impact of Christmas trees goes beyond choosing real or artificial. <b><u>[II]</b></u> Real trees, typically spruce, fir, or pine, are grown on plantations for about ten years, supporting biodiversity by providing habitats for farmland birds and insects. <b><u>[III]</b></u> These trees play a small but meaningful role in preserving rural landscapes and preventing alternative, less sustainable land uses, like urban development. <b><u>[IV]</b></u>.

<b><u>Artificial trees, while reusable, have a significantly higher carbon footprint during production and transport.</b></u> According to the Carbon Trust, they must be reused for several years to match the lower carbon footprint of real trees.

Disposal methods are critical. Real trees release their stored carbon upon decay, but if they end up in landfill, anaerobic conditions produce methane, a far more <b><u>potent</b></u> greenhouse gas. Composting, chipping, or using trees for energy or habitat restoration are far better alternatives. Additionally, some companies now offer tree rentals, and pot-grown trees can be replanted, making <b><u>them</b></u> excellent sustainable options.

Sustainability efforts can also include buying locally grown trees, reducing travel emissions, and supporting certified sustainable farms. While Christmas trees represent a minor part of land use and the global carbon cycle, their management highlights opportunities for improvement. Reducing waste, eliminating fertilisers, and avoiding landfill disposal are practical steps toward making this <b><u>cherished</b></u> tradition more eco-friendly.

Though a small element of the festive season, Christmas trees remind us of the broader need to balance ecological responsibility with tradition. With mindful practices, this holiday symbol can contribute positively to both biodiversity and climate goals.
</b></u>`,

// STATE
let currentTest=1,currentQuestionIndex=0;
let savedAnswers={}; // lưu kiểu { "1-0":2 , "1-1":1 , "2-3":0 }

function loadTest(num){
 currentTest=num;
document.getElementById('title').innerText=
'Read the following passage and mark the letter A, B, C or D to indicate the best answer to each of the following questions.';

 document.getElementById('resultArea').innerHTML='';
 currentQuestionIndex=0;
 document.getElementById('reading').innerHTML = exercises[num].passage.replace(/\n/g,'<br>');
 renderQuestions(); renderPagination();
}

function renderQuestions(){
 const q=exercises[currentTest].questions[currentQuestionIndex];
 let key=currentTest+'-'+currentQuestionIndex;
 let html='<div class="question">'+(currentQuestionIndex+1)+'. '+ q.q +'</div>';

 q.options.forEach((opt,i)=>{
   const checked = savedAnswers[key]==i ? 'checked' : '';
   html+=`<label><input type="radio" name="q${currentQuestionIndex}"
    value="${i}" ${checked} onclick="saveAnswer(${i})"> ${opt}</label>`;
 });

 document.getElementById('questions').innerHTML=html;
}

function saveAnswer(v){
 savedAnswers[currentTest+'-'+currentQuestionIndex]=v;
}

function nextQ(){
 if(currentQuestionIndex < exercises[currentTest].questions.length-1){
   currentQuestionIndex++;
   renderQuestions();
 }
}
function prevQ(){
 if(currentQuestionIndex>0){
   currentQuestionIndex--;
   renderQuestions();
 }
}

function renderPagination(){
 let h='';
 for(let k in exercises)
   h+=`<button onclick="loadTest(${k})">Passage ${k}</button>`;
 document.getElementById('pagination').innerHTML=h;
}

// Confirm box
function openConfirm(){document.getElementById('confirmBox').style.display='flex';}
function closeConfirm(){document.getElementById('confirmBox').style.display='none';}

// SUBMIT
function submitTest(){
 closeConfirm();
 const qs=exercises[currentTest].questions;
 let correct=0,txt='';

 for(let i=0;i<qs.length;i++){
   let key=currentTest+'-'+i;
   let chosen=savedAnswers[key];
   let ok=chosen==qs[i].answer;
   if(ok) correct++;
   txt+=`${i+1}. ${qs[i].q}
Your answer: ${chosen!=null?qs[i].options[chosen]:'(no answer)'}
Correct answer: ${qs[i].options[qs[i].answer]}
${ok?'✓ Correct':'✗ Wrong'}
Giải thích: ${qs[i].explain}\n\n`;
 }

 document.getElementById('resultArea').innerHTML=
 `<div class="result-box">Kết quả: ${correct}/${qs.length}\n\n${txt}</div>`;
}

let selectedRange = null;

// Hiện menu khi chọn chữ hoặc click highlight
document.addEventListener('mouseup', function(e) {
  const sel = window.getSelection();

  // Nếu click vào chữ đã highlight
  if (e.target.classList.contains('highlight')) {
    selectedRange = null;
    showMenu(e.pageX, e.pageY);
    selectedRange = e.target;
    return;
  }

  // Nếu không select gì thì đóng menu
  if (!sel.toString().trim()) {
    hideMenu();
    return;
  }

  selectedRange = sel.getRangeAt(0);
  showMenu(e.pageX, e.pageY);
});

// Highlight
function applyHighlight() {
  if (!selectedRange) return;

  // Nếu click highlight đang tồn tại → bỏ highlight trước rồi tô lại
  if (selectedRange instanceof HTMLElement && selectedRange.classList.contains('highlight')) {
    removeHighlight();
    return;
  }

  const span = document.createElement('span');
  span.className = 'highlight';
  span.appendChild(selectedRange.extractContents());
  selectedRange.insertNode(span);

  selectedRange = null;
  hideMenu();
}

// Remove highlight
function removeHighlight() {
  if (!selectedRange) return;

  if (selectedRange instanceof HTMLElement && selectedRange.classList.contains('highlight')) {
    const parent = selectedRange.parentNode;
    while (selectedRange.firstChild) {
      parent.insertBefore(selectedRange.firstChild, selectedRange);
    }
    parent.removeChild(selectedRange);
  }
  selectedRange = null;
  hideMenu();
}

// menu show/hide
function showMenu(x, y) {
  const box = document.getElementById('textMenu');
  box.style.left = x + 'px';
  box.style.top = y + 'px';
  box.style.display = 'block';
}
function hideMenu() {
  document.getElementById('textMenu').style.display = 'none';
}



window.onload=()=>loadTest(1);
</script>
